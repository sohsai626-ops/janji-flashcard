<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ターゲット1900 フラッシュカード</title>
<style>
  :root{
    --green:#1b6e3c;
    --green-dark:#0f4d29;
    --green-light:#e8f5ec;
    --accent:#ffb703;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Hiragino Sans","Yu Gothic",sans-serif;
    background:var(--green-light);
    color:#222;
    min-height:100vh;
  }
  header{
    background:var(--green);
    color:#fff;
    padding:14px 16px 10px;
    text-align:center;
    position:relative;
  }
  header h1{margin:0;font-size:1.05rem;}
  header .build{
    font-size:0.65rem;
    color:#cde9d6;
    margin-top:2px;
  }
  .tabs{
    display:flex;
    background:var(--green-dark);
  }
  .tabs button{
    flex:1;
    padding:10px 4px;
    background:none;
    border:none;
    color:#cde9d6;
    font-size:0.8rem;
    cursor:pointer;
  }
  .tabs button.active{
    color:#fff;
    background:var(--green);
    font-weight:bold;
  }
  .screen{display:none;padding:16px;max-width:480px;margin:0 auto;}
  .screen.show{display:block;}

  /* 学習画面 */
  .progress-bar{
    height:6px;
    background:#cfe7d8;
    border-radius:3px;
    overflow:hidden;
    margin-bottom:10px;
  }
  .progress-bar-fill{
    height:100%;
    background:var(--accent);
    width:0%;
    transition:width .2s;
  }
  .progress-text{
    text-align:center;
    font-size:0.8rem;
    color:#555;
    margin-bottom:14px;
  }
  .card{
    background:#fff;
    border-radius:16px;
    box-shadow:0 4px 14px rgba(0,0,0,0.12);
    min-height:220px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:24px 16px;
    cursor:pointer;
    user-select:none;
    position:relative;
  }
  .card .no{
    position:absolute;
    top:10px;
    left:14px;
    font-size:0.75rem;
    color:#aaa;
  }
  .card .word{
    font-size:2rem;
    font-weight:bold;
    color:var(--green-dark);
    margin-bottom:10px;
    word-break:break-word;
  }
  .card .meaning{
    font-size:1.2rem;
    color:#444;
    display:none;
  }
  .card.flipped .meaning{display:block;}
  .card .hint{
    font-size:0.75rem;
    color:#bbb;
    margin-top:14px;
  }
  .speak-btn{
    position:absolute;
    top:8px;
    right:10px;
    background:none;
    border:none;
    font-size:1.4rem;
    cursor:pointer;
  }
  .controls{
    display:flex;
    gap:10px;
    margin-top:18px;
  }
  .controls button{
    flex:1;
    padding:14px 0;
    border:none;
    border-radius:10px;
    font-size:1rem;
    font-weight:bold;
    cursor:pointer;
  }
  .btn-no{background:#f1d2d2;color:#a33;}
  .btn-yes{background:#cdeedb;color:var(--green-dark);}
  .nav-row{
    display:flex;
    justify-content:space-between;
    margin-top:14px;
  }
  .nav-row button{
    background:none;
    border:1px solid #ccc;
    border-radius:8px;
    padding:8px 14px;
    font-size:0.85rem;
    color:#666;
  }

  /* ランキング・履歴 */
  table{width:100%;border-collapse:collapse;font-size:0.9rem;}
  th,td{padding:8px 6px;border-bottom:1px solid #ddd;text-align:left;}
  th{color:var(--green-dark);}
  .stat-card{
    background:#fff;
    border-radius:12px;
    padding:14px;
    margin-bottom:12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.06);
  }
  .stat-num{font-size:1.6rem;font-weight:bold;color:var(--green);}
  .small{font-size:0.8rem;color:#777;}
  .reset-btn{
    margin-top:18px;
    width:100%;
    padding:10px;
    background:#eee;
    border:none;
    border-radius:8px;
    color:#888;
    font-size:0.85rem;
  }
  .letter-tile{
    width:38px;
    height:42px;
    border-radius:8px;
    border:1px solid var(--green);
    background:#fff;
    color:var(--green-dark);
    font-size:1.1rem;
    font-weight:bold;
    cursor:pointer;
  }
  .letter-tile:disabled{
    opacity:0.25;
    cursor:default;
  }
  .answer-slot{
    width:38px;
    height:42px;
    border-radius:8px;
    border:2px solid transparent;
    border-bottom:2px solid var(--green);
    background:var(--green-light);
    color:var(--green-dark);
    font-size:1.1rem;
    font-weight:bold;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .answer-slot.drag-over{
    background:#fff8e1;
    border-color:var(--accent);
  }
  .mode-btn.active{
    background:var(--green)!important;
    color:#fff!important;
  }
  .sub-mode-btn.active{
    background:var(--accent)!important;
    color:#5c3d00!important;
  }
</style>
</head>
<body>

<header>
  <h1>ターゲット1900 フラッシュカード</h1>
  <div class="build">全19セット・1〜1900語・build v15（苦手単語だけ復習モード追加）</div>
</header>

<div class="tabs">
  <button class="tab-btn active" data-tab="study">学習</button>
  <button class="tab-btn" data-tab="rank">苦手ランキング</button>
  <button class="tab-btn" data-tab="history">学習履歴</button>
</div>

<!-- 学習タブ -->
<div id="tabStudy" class="screen show">
  <div id="setSelector" style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;"></div>
  <div class="progress-bar"><div class="progress-bar-fill" id="progressFill"></div></div>
  <div class="progress-text" id="progressText">0 / 100</div>

  <div class="mode-toggle" style="display:flex;gap:8px;margin-bottom:10px;">
    <button class="mode-btn active" id="modeCardBtn" style="flex:1;padding:8px 0;border:1px solid var(--green);border-radius:8px;background:#fff;color:var(--green);font-size:0.85rem;">カード学習</button>
    <button class="mode-btn" id="modeSpellBtn" style="flex:1;padding:8px 0;border:1px solid var(--green);border-radius:8px;background:#fff;color:var(--green);font-size:0.85rem;">文字並べ式</button>
  </div>

  <div style="display:flex;margin-bottom:10px;">
    <button id="reviewToggleBtn" style="flex:1;padding:8px 0;border:1px solid var(--accent);border-radius:8px;background:#fff;color:#8a6300;font-size:0.85rem;">🔁 苦手単語だけ復習（全セット対象）</button>
  </div>

  <div id="spellSubToggle" style="display:none;gap:8px;margin-bottom:14px;flex-wrap:wrap;">
    <button class="sub-mode-btn active" id="subBasicBtn" style="flex:1;min-width:100px;padding:6px 0;border:1px solid var(--accent);border-radius:8px;background:#fff;color:#8a6300;font-size:0.78rem;">ベーシック（ダミーなし）</button>
    <button class="sub-mode-btn" id="subChallengeBtn" style="flex:1;min-width:100px;padding:6px 0;border:1px solid var(--accent);border-radius:8px;background:#fff;color:#8a6300;font-size:0.78rem;">チャレンジ（ダミーあり）</button>
    <button class="sub-mode-btn" id="subTypeBtn" style="flex:1;min-width:100px;padding:6px 0;border:1px solid var(--accent);border-radius:8px;background:#fff;color:#8a6300;font-size:0.78rem;">✏️ フル入力</button>
  </div>

  <div id="voiceWarning" style="display:none;background:#fff3cd;border:1px solid #f0c36d;border-radius:10px;padding:10px 12px;margin-bottom:12px;font-size:0.8rem;color:#7a5b00;line-height:1.5;">
    ⚠️ 英語の音声が見つかりません。発音がカタカナ読みになる場合は、iPhoneの「設定」→「アクセシビリティ」→「読み上げコンテンツ」→「声」で<strong>English</strong>の声をダウンロードしてください。
  </div>

  <div id="cardView">
  <div class="card" id="card">
    <div class="no" id="cardNo">No.1</div>
    <button class="speak-btn" id="speakBtn" title="発音を聞く">🔊</button>
    <div class="word" id="cardWord">create</div>
    <div class="meaning" id="cardMeaning">創り出す</div>
    <div class="hint" id="cardHint">タップして意味を表示</div>
  </div>

  <div class="controls" id="controls" style="visibility:hidden;">
    <button class="btn-no" id="btnNo">✕ わからない</button>
    <button class="btn-yes" id="btnYes">○ わかった</button>
  </div>

  <div class="nav-row">
    <button id="btnShuffle">🔀 シャッフル</button>
    <button id="btnRestart">↺ 最初から</button>
  </div>
  </div>

  <div id="spellView" style="display:none;">
    <div class="card" id="spellCard" style="cursor:default;">
      <div class="no" id="spellNo">No.1</div>
      <button class="speak-btn" id="spellSpeakBtn" title="発音を聞く">🔊</button>
      <div class="meaning" id="spellMeaning" style="display:block;font-size:1.3rem;font-weight:bold;color:var(--green-dark);margin-bottom:14px;">創り出す</div>
      <div id="spellAnswerSlot" style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap;min-height:46px;margin-bottom:16px;"></div>
      <div id="spellLetterTray" style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap;"></div>
      <div id="spellTypeWrap" style="display:none;justify-content:center;margin-bottom:6px;">
        <input id="spellTypeInput" type="text" autocapitalize="off" autocorrect="off" autocomplete="off" spellcheck="false" placeholder="英単語を入力" style="width:100%;max-width:280px;font-size:1.3rem;text-align:center;padding:10px 8px;border:2px solid var(--green);border-radius:10px;letter-spacing:2px;">
      </div>
      <div class="hint" id="spellFeedback" style="margin-top:14px;min-height:20px;"></div>
    </div>

    <div class="controls">
      <button class="btn-no" id="spellBackBtn" style="flex:0.8;">⌫ 1文字消す</button>
      <button class="btn-no" id="spellClearBtn" style="flex:1;">↺ クリア</button>
      <button class="btn-yes" id="spellCheckBtn">○ 判定する</button>
    </div>

    <div class="nav-row">
      <button id="spellShuffleBtn">🔀 シャッフル</button>
      <button id="spellNextBtn">次へ ➡</button>
    </div>
  </div>
</div>

<!-- 苦手ランキングタブ -->
<div id="tabRank" class="screen">
  <h2 style="color:var(--green-dark);font-size:1rem;">苦手ランキング</h2>
  <p class="small">「わからない」を押した回数が多い順に表示します。</p>
  <table>
    <thead><tr><th>No.</th><th>単語</th><th>意味</th><th>✕回数</th></tr></thead>
    <tbody id="rankBody"></tbody>
  </table>
</div>

<!-- 学習履歴タブ -->
<div id="tabHistory" class="screen">
  <div class="stat-card">
    <div class="stat-num" id="statTotal">0</div>
    <div class="small">これまでの総学習回数</div>
  </div>
  <div class="stat-card">
    <div class="stat-num" id="statMastered">0 / 100</div>
    <div class="small">「わかった」が一度でもある語数</div>
  </div>
  <div class="stat-card">
    <div class="stat-num" id="statLast">-</div>
    <div class="small">最終学習日</div>
  </div>
  <button class="reset-btn" id="btnReset">学習履歴をリセットする</button>
</div>

let currentSet = 1;
let DATA = SETS[currentSet];
function allWords(){ return Object.keys(SETS).flatMap(k => SETS[k]); }

const STORAGE_KEY = 'target1900_set1_progress';

function loadProgress(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  const init = {};
  DATA.forEach(d => { init[d.no] = {wrong:0, right:0}; });
  return { stats: init, totalSessions:0, lastDate:null };
}
function saveProgress(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
}

let progress = loadProgress();
let order = DATA.map(d => d.no);
let idx = 0;
let flipped = false;

const cardEl = document.getElementById('card');
const cardNo = document.getElementById('cardNo');
const cardWord = document.getElementById('cardWord');
const cardMeaning = document.getElementById('cardMeaning');
const cardHint = document.getElementById('cardHint');
const controls = document.getElementById('controls');
const progressFill = document.getElementById('progressFill');
const progressText = document.getElementById('progressText');

function dataByNo(no){ return allWords().find(d => d.no === no); }

let reviewMode = false;

function wrongList(){
  // 全セット対象。「✕回数 > ○回数」の単語を苦手単語とみなす
  return allWords().filter(d => {
    const s = progress.stats[d.no];
    return s && s.wrong > s.right;
  }).map(d => d.no);
}

function buildOrder(){
  if(reviewMode){
    return wrongList();
  }
  return DATA.map(d => d.no);
}

function renderCard(){
  if(reviewMode && order.length === 0){
    cardNo.textContent = '';
    cardWord.textContent = '🎉 苦手な単語はありません';
    cardMeaning.textContent = 'このまま頑張ろう！';
    cardHint.textContent = '';
    controls.style.visibility = 'hidden';
    cardEl.classList.remove('flipped');
    progressFill.style.width = '0%';
    progressText.textContent = '0 / 0';
    return;
  }
  if(idx >= order.length){
    cardNo.textContent = '完了!';
    cardWord.textContent = 'お疲れさまでした 🎉';
    cardMeaning.textContent = '';
    cardHint.textContent = '「最初から」でもう一周できます';
    controls.style.visibility = 'hidden';
    cardEl.classList.remove('flipped');
    progressFill.style.width = '100%';
    progressText.textContent = `${order.length} / ${order.length}`;
    return;
  }
  const no = order[idx];
  const d = dataByNo(no);
  cardNo.textContent = 'No.' + no;
  cardWord.textContent = d.w;
  cardMeaning.textContent = d.m;
  cardHint.textContent = 'タップして意味を表示';
  cardEl.classList.remove('flipped');
  flipped = false;
  controls.style.visibility = 'hidden';
  progressFill.style.width = (idx / order.length * 100) + '%';
  progressText.textContent = `${idx} / ${order.length}`;
}

cardEl.addEventListener('click', (e) => {
  if(e.target.id === 'speakBtn') return;
  if(idx >= order.length) return;
  flipped = !flipped;
  cardEl.classList.toggle('flipped', flipped);
  controls.style.visibility = flipped ? 'visible' : 'hidden';
});

document.getElementById('speakBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  if(idx >= order.length) return;
  const d = dataByNo(order[idx]);
  speak(d.w);
});

let englishVoice = null;

function pickEnglishVoice(){
  const voices = window.speechSynthesis.getVoices();
  if(!voices || voices.length === 0) return null;
  // 優先順位: en-US > en-GB > その他の en-*
  let v = voices.find(v => v.lang === 'en-US');
  if(!v) v = voices.find(v => v.lang === 'en-GB');
  if(!v) v = voices.find(v => v.lang && v.lang.toLowerCase().startsWith('en'));
  return v || null;
}

if('speechSynthesis' in window){
  // 一部ブラウザは非同期に音声リストを読み込むため、準備できたら再取得
  window.speechSynthesis.onvoiceschanged = () => {
    englishVoice = pickEnglishVoice();
    updateVoiceWarning();
  };
  englishVoice = pickEnglishVoice();
}

function updateVoiceWarning(){
  const el = document.getElementById('voiceWarning');
  if(!el) return;
  el.style.display = englishVoice ? 'none' : 'block';
}
updateVoiceWarning();
// iOSは読み込み直後に音声リストが空のことがあるため少し待って再チェック
setTimeout(() => {
  if(!englishVoice){
    englishVoice = pickEnglishVoice();
    updateVoiceWarning();
  }
}, 800);

function speak(text){
  if(!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  if(!englishVoice) englishVoice = pickEnglishVoice();
  if(englishVoice){
    u.voice = englishVoice;
    u.lang = englishVoice.lang;
  } else {
    // 英語音声が見つからない場合の保険
    u.lang = 'en-US';
  }
  u.rate = 0.85;
  window.speechSynthesis.speak(u);
}

function answer(correct){
  const no = order[idx];
  if(!progress.stats[no]) progress.stats[no] = {wrong:0, right:0};
  if(correct) progress.stats[no].right++;
  else progress.stats[no].wrong++;
  progress.stats[no].lastSeen = new Date().toISOString().slice(0,10);
  progress.totalSessions++;
  progress.lastDate = new Date().toISOString().slice(0,10);
  saveProgress();
  idx++;
  renderCard();
}

document.getElementById('btnYes').addEventListener('click', () => answer(true));
document.getElementById('btnNo').addEventListener('click', () => answer(false));

document.getElementById('btnShuffle').addEventListener('click', () => {
  order = order.slice().sort(() => Math.random() - 0.5);
  idx = 0;
  renderCard();
});
document.getElementById('btnRestart').addEventListener('click', () => {
  order = buildOrder();
  idx = 0;
  renderCard();
});

const reviewToggleBtn = document.getElementById('reviewToggleBtn');
reviewToggleBtn.addEventListener('click', () => {
  reviewMode = !reviewMode;
  if(reviewMode){
    reviewToggleBtn.style.background = 'var(--accent)';
    reviewToggleBtn.style.color = '#5c3d00';
    reviewToggleBtn.textContent = '✕ 復習モード解除（' + wrongList().length + '語）';
  } else {
    reviewToggleBtn.style.background = '#fff';
    reviewToggleBtn.style.color = '#8a6300';
    reviewToggleBtn.textContent = '🔁 苦手単語だけ復習（全セット対象）';
  }
  order = buildOrder();
  idx = 0;
  renderCard();
});

    // 先に新しいタブの内容を表示してから、他のタブを隠す

    }

    }

      document.getElementById('tabHistory').classList.add('show');
      renderHistory();
    }
    document.querySelectorAll('.screen').forEach(s => {
      if(s.id !== 'tab' + tab.charAt(0).toUpperCase() + tab.slice(1)){
        s.classList.remove('show');
      }
    });
  });
});

function renderRank(){
  const rows = allWords().map(d => {
    const s = progress.stats[d.no] || {wrong:0, right:0};
    return { ...d, wrong: s.wrong };
  }).filter(d => d.wrong > 0).sort((a,b) => b.wrong - a.wrong);
  const body = document.getElementById('rankBody');
  if(rows.length === 0){
    body.innerHTML = '<tr><td colspan="4" class="small">まだデータがありません</td></tr>';
    return;
  }
  body.innerHTML = rows.map(r => `<tr><td>${r.no}</td><td>${r.w}</td><td>${r.m}</td><td>${r.wrong}</td></tr>`).join('');
}

function renderHistory(){
  document.getElementById('statTotal').textContent = progress.totalSessions;
  const masteredCount = Object.values(progress.stats).filter(s => s.right > 0).length;
  document.getElementById('statMastered').textContent = `${masteredCount} / ${allWords().length}`;
  document.getElementById('statLast').textContent = progress.lastDate || '-';
}

document.getElementById('btnReset').addEventListener('click', () => {
  if(confirm('学習履歴をリセットしますか？この操作は元に戻せません。')){
    localStorage.removeItem(STORAGE_KEY);
    progress = loadProgress();
    renderHistory();
    renderRank();
    alert('リセットしました');
  }
});

renderCard();

/* ===== スペリングモード ===== */
let spellOrder = DATA.map(d => d.no);
let spellIdx = 0;
let spellAnswer = []; // 各マスの内容（位置固定の配列。nullは空マス）
let spellLetters = []; // {ch, used:bool}
let spellChecked = false;
let selectedSlotIndex = null; // タップで選択中の空マス

const modeCardBtn = document.getElementById('modeCardBtn');
const modeSpellBtn = document.getElementById('modeSpellBtn');
const cardView = document.getElementById('cardView');
const spellView = document.getElementById('spellView');
const spellSubToggle = document.getElementById('spellSubToggle');
const subBasicBtn = document.getElementById('subBasicBtn');
const subChallengeBtn = document.getElementById('subChallengeBtn');
const subTypeBtn = document.getElementById('subTypeBtn');
const spellTypeWrap = document.getElementById('spellTypeWrap');
const spellTypeInput = document.getElementById('spellTypeInput');
let spellSubMode = 'basic'; // 'basic' | 'challenge' | 'type'

modeCardBtn.addEventListener('click', () => {
  modeCardBtn.classList.add('active');
  modeSpellBtn.classList.remove('active');
  cardView.style.display = '';
  spellView.style.display = 'none';
  spellSubToggle.style.display = 'none';
});
modeSpellBtn.addEventListener('click', () => {
  modeSpellBtn.classList.add('active');
  modeCardBtn.classList.remove('active');
  cardView.style.display = 'none';
  spellView.style.display = '';
  spellSubToggle.style.display = 'flex';
  renderSpell();
});
subBasicBtn.addEventListener('click', () => {
  spellSubMode = 'basic';
  subBasicBtn.classList.add('active');
  subChallengeBtn.classList.remove('active');
  subTypeBtn.classList.remove('active');
  spellIdx = 0;
  renderSpell();
});
subChallengeBtn.addEventListener('click', () => {
  spellSubMode = 'challenge';
  subChallengeBtn.classList.add('active');
  subBasicBtn.classList.remove('active');
  subTypeBtn.classList.remove('active');
  spellIdx = 0;
  renderSpell();
});
subTypeBtn.addEventListener('click', () => {
  spellSubMode = 'type';
  subTypeBtn.classList.add('active');
  subBasicBtn.classList.remove('active');
  subChallengeBtn.classList.remove('active');
  spellIdx = 0;
  renderSpell();
});

function shuffleArr(arr){
  return arr.slice().sort(() => Math.random() - 0.5);
}

function makeDummyLetters(word, count){
  const used = new Set(word.toLowerCase().split(''));
  const pool = 'abcdefghijklmnopqrstuvwxyz'.split('').filter(c => !used.has(c));
  const shuffledPool = shuffleArr(pool);
  return shuffledPool.slice(0, count);
}

function renderSpell(){
  const fb = document.getElementById('spellFeedback');
  fb.textContent = '';
  selectedSlotIndex = null;
  if(spellIdx >= spellOrder.length){
    document.getElementById('spellNo').textContent = '完了!';
    document.getElementById('spellMeaning').textContent = 'お疲れさまでした 🎉';
    document.getElementById('spellAnswerSlot').innerHTML = '';
    document.getElementById('spellLetterTray').innerHTML = '';
    spellTypeWrap.style.display = 'none';
    return;
  }
  const d = dataByNo(spellOrder[spellIdx]);
  document.getElementById('spellNo').textContent = 'No.' + d.no;
  document.getElementById('spellMeaning').textContent = d.m;
  spellChecked = false;

  if(spellSubMode === 'type'){
    document.getElementById('spellAnswerSlot').innerHTML = '';
    document.getElementById('spellLetterTray').innerHTML = '';
    spellTypeWrap.style.display = 'flex';
    spellTypeInput.value = '';
    spellTypeInput.disabled = false;
    spellTypeInput.style.borderColor = 'var(--green)';
    return;
  }
  spellTypeWrap.style.display = 'none';

  const letters = d.w.toLowerCase().split('');
  spellAnswer = new Array(letters.length).fill(null); // 位置固定（どこからでも埋められる）
  let pool = letters.map((ch, i) => ({ch, id:'r'+i, dummy:false}));
  if(spellSubMode === 'challenge'){
    const dummyCount = Math.max(3, Math.min(6, Math.round(letters.length * 0.5)));
    const dummies = makeDummyLetters(d.w, dummyCount).map((ch, i) => ({ch, id:'d'+i, dummy:true}));
    pool = pool.concat(dummies);
  }
  const shuffled = shuffleArr(pool);
  spellLetters = shuffled.map(item => ({...item, used:false}));
  renderSpellSlots(letters.length);
  renderSpellTray();
}

function firstEmptySlot(){
  return spellAnswer.findIndex(s => s === null);
}

function placeLetterAt(item, idx){
  item.used = true;
  spellAnswer[idx] = item;
  selectedSlotIndex = null;
  const next = firstEmptySlot();
  if(next !== -1) selectedSlotIndex = next;
  renderSpellSlots(spellAnswer.length);
  renderSpellTray();
}

function placeLetter(item){
  // 選択中の空マスがあればそこへ、なければ最初の空マスへ
  let idx = (selectedSlotIndex !== null && spellAnswer[selectedSlotIndex] === null) ? selectedSlotIndex : firstEmptySlot();
  if(idx === -1) return; // 満杯
  placeLetterAt(item, idx);
}

function renderSpellSlots(len){
  const slot = document.getElementById('spellAnswerSlot');
  slot.innerHTML = '';
  for(let i=0;i<len;i++){
    const div = document.createElement('div');
    div.className = 'answer-slot';
    div.dataset.idx = i;
    div.textContent = spellAnswer[i] ? spellAnswer[i].ch : '';
    if(!spellChecked && i === selectedSlotIndex && spellAnswer[i] === null){
      div.style.borderColor = 'var(--accent)';
      div.style.borderWidth = '3px';
      div.style.background = '#fff8e1';
    }
    div.addEventListener('click', () => {
      if(spellChecked) return;
      if(spellAnswer[i]){
        // 文字が入っているマスをタップ → そのマスだけ消す
        const letterObj = spellAnswer[i];
        letterObj.used = false;
        spellAnswer[i] = null;
        selectedSlotIndex = i;
        renderSpellSlots(len);
        renderSpellTray();
      } else {
        // 空マスをタップ → ここに次の文字を置く、と選択する
        selectedSlotIndex = i;
        renderSpellSlots(len);
      }
    });
    slot.appendChild(div);
  }
}

let dragGhost = null;
let dragStartPos = null;
let dragItem = null;

function clearDragGhost(){
  if(dragGhost){ dragGhost.remove(); dragGhost = null; }
  document.querySelectorAll('.answer-slot.drag-over').forEach(el => el.classList.remove('drag-over'));
}

function renderSpellTray(){
  const tray = document.getElementById('spellLetterTray');
  tray.innerHTML = '';
  spellLetters.forEach((item) => {
    const btn = document.createElement('button');
    btn.className = 'letter-tile';
    btn.textContent = item.ch;
    btn.style.opacity = item.used ? '0.25' : '1';
    btn.style.touchAction = 'none';
    btn.disabled = item.used || spellChecked;

    btn.addEventListener('pointerdown', (e) => {
      if(spellChecked || item.used) return;
      dragItem = item;
      dragStartPos = {x:e.clientX, y:e.clientY};
      dragGhost = btn.cloneNode(true);
      dragGhost.style.position = 'fixed';
      dragGhost.style.zIndex = '9999';
      dragGhost.style.pointerEvents = 'none';
      dragGhost.style.opacity = '0.9';
      dragGhost.style.left = (e.clientX - 18) + 'px';
      dragGhost.style.top = (e.clientY - 18) + 'px';
      document.body.appendChild(dragGhost);
    });
    tray.appendChild(btn);
  });
}

document.addEventListener('pointermove', (e) => {
  if(!dragGhost) return;
  dragGhost.style.left = (e.clientX - 18) + 'px';
  dragGhost.style.top = (e.clientY - 18) + 'px';
  document.querySelectorAll('.answer-slot.drag-over').forEach(el => el.classList.remove('drag-over'));
  const under = document.elementFromPoint(e.clientX, e.clientY);
  const slotEl = under ? under.closest('.answer-slot') : null;
  if(slotEl) slotEl.classList.add('drag-over');
});

document.addEventListener('pointerup', (e) => {
  if(!dragItem) return;
  const item = dragItem;
  const moved = dragStartPos ? Math.hypot(e.clientX - dragStartPos.x, e.clientY - dragStartPos.y) : 0;
  const under = document.elementFromPoint(e.clientX, e.clientY);
  const slotEl = under ? under.closest('.answer-slot') : null;
  clearDragGhost();
  dragItem = null;
  dragStartPos = null;
  if(item.used || spellChecked) return;
  if(slotEl && spellAnswer[Number(slotEl.dataset.idx)] === null){
    // 指定のマスにドロップ
    placeLetterAt(item, Number(slotEl.dataset.idx));
  } else if(moved < 8){
    // ほぼ動いていない＝タップ扱い
    placeLetter(item);
  }
  // ドラッグしたが空マス以外の場所で離した場合は何もしない（元に戻る）
});

document.getElementById('spellBackBtn').addEventListener('click', () => {
  if(spellChecked) return;
  if(spellSubMode === 'type'){
    spellTypeInput.value = spellTypeInput.value.slice(0, -1);
    return;
  }
  // 一番右（末尾）の、文字が入っているマスを1つ消す
  for(let i = spellAnswer.length - 1; i >= 0; i--){
    if(spellAnswer[i]){
      spellAnswer[i].used = false;
      spellAnswer[i] = null;
      selectedSlotIndex = i;
      break;
    }
  }
  renderSpellSlots(spellAnswer.length);
  renderSpellTray();
});

document.getElementById('spellClearBtn').addEventListener('click', () => {
  if(spellChecked) return;
  if(spellSubMode === 'type'){
    spellTypeInput.value = '';
    return;
  }
  spellAnswer.forEach(item => { if(item) item.used = false; });
  spellAnswer = spellAnswer.map(() => null);
  selectedSlotIndex = 0;
  renderSpellSlots(spellAnswer.length);
  renderSpellTray();
});

document.getElementById('spellShuffleBtn').addEventListener('click', () => {
  spellOrder = shuffleArr(spellOrder);
  spellIdx = 0;
  renderSpell();
});

document.getElementById('spellCheckBtn').addEventListener('click', () => {
  if(spellIdx >= spellOrder.length) return;
  const d = dataByNo(spellOrder[spellIdx]);
  const built = spellSubMode === 'type'
    ? spellTypeInput.value.trim().toLowerCase()
    : spellAnswer.map(a => a ? a.ch : '').join('');
  const fb = document.getElementById('spellFeedback');
  spellChecked = true;
  if(spellSubMode === 'type'){
    spellTypeInput.disabled = true;
  } else {
    renderSpellTray();
  }
  if(built === d.w.toLowerCase()){
    fb.textContent = '○ 正解！';
    fb.style.color = 'var(--green-dark)';
    if(!progress.stats[d.no]) progress.stats[d.no] = {wrong:0, right:0};
    progress.stats[d.no].right++;
  } else {
    fb.textContent = `✕ 不正解（正解: ${d.w}）`;
    fb.style.color = '#a33';
    if(!progress.stats[d.no]) progress.stats[d.no] = {wrong:0, right:0};
    progress.stats[d.no].wrong++;
  }
  progress.totalSessions++;
  progress.lastDate = new Date().toISOString().slice(0,10);
  saveProgress();
});

document.getElementById('spellNextBtn').addEventListener('click', () => {
  spellIdx++;
  renderSpell();
});

document.getElementById('spellSpeakBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  if(spellIdx >= spellOrder.length) return;
  const d = dataByNo(spellOrder[spellIdx]);
  speak(d.w);
});

/* ===== セット切替 ===== */
let currentPart = null; // 現在選択中のPart（初期はセット1が属するPartを自動選択）

function partOf(setNo){
  for(const p in PARTS){ if(PARTS[p].includes(setNo)) return Number(p); }
  return 1;
}

function switchSet(n){
  currentSet = n;
  currentPart = partOf(n);
  DATA = SETS[currentSet];
  order = DATA.map(d => d.no);
  idx = 0;
  flipped = false;
  renderCard();
  spellOrder = DATA.map(d => d.no);
  spellIdx = 0;
  if(typeof renderSpell === 'function') renderSpell();
  renderSetSelector();
}

function switchPart(p){
  currentPart = p;
  renderSetSelector();
}

function renderSetSelector(){
  if(currentPart === null) currentPart = partOf(currentSet);
  const el = document.getElementById('setSelector');
  const partKeys = Object.keys(PARTS).map(Number).sort((a,b)=>a-b);
  const partRange = p => {
    const sets = PARTS[p];
    const first = SETS[sets[0]][0].no;
    const last = SETS[sets[sets.length-1]][SETS[sets[sets.length-1]].length-1].no;
    return `${first}〜${last}`;
  };
  let html = '<div style="display:flex;gap:6px;flex-wrap:wrap;width:100%;margin-bottom:6px;">';
  html += partKeys.map(p => {
    const active = p === currentPart;
    return `<button class="part-btn" data-part="${p}" style="flex:1 1 auto;min-width:90px;padding:7px 4px;border:1px solid var(--green-dark);border-radius:8px;font-size:0.8rem;font-weight:bold;background:${active ? 'var(--green-dark)' : '#fff'};color:${active ? '#fff' : 'var(--green-dark)'};">Part${p}（${partRange(p)}）</button>`;
  }).join('');
  html += '</div>';
  html += '<div style="display:flex;gap:6px;flex-wrap:wrap;width:100%;">';
  html += PARTS[currentPart].map(k => {
    const active = k === currentSet && Object.keys(SETS).map(Number).includes(k);
    const exists = SETS.hasOwnProperty(k);
    return `<button class="set-btn" data-set="${k}" ${exists ? '' : 'disabled'} style="flex:1 1 auto;min-width:60px;padding:6px 4px;border:1px solid var(--green);border-radius:8px;font-size:0.78rem;background:${active ? 'var(--green)' : '#fff'};color:${active ? '#fff' : (exists ? 'var(--green)' : '#bbb')};opacity:${exists ? '1':'0.5'};">セット${k}</button>`;
  }).join('');
  html += '</div>';
  el.innerHTML = html;
  el.querySelectorAll('.part-btn').forEach(btn => {
    btn.addEventListener('click', () => switchPart(Number(btn.dataset.part)));
  });
  el.querySelectorAll('.set-btn:not([disabled])').forEach(btn => {
    btn.addEventListener('click', () => switchSet(Number(btn.dataset.set)));
  });
}
renderSetSelector();

</script>
