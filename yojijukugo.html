<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>四字熟語フラッシュカード｜創才学院</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Noto+Sans+JP:wght@300;400;700&display=swap');

  :root {
    --bg: #faf7f2;
    --card-bg: #ffffff;
    --primary: #4a2060;      /* 深紫：四字熟語の格調イメージ */
    --accent: #c0392b;       /* 朱赤：アクセント */
    --text: #1a1a1a;
    --muted: #888;
    --shadow: 0 8px 32px rgba(0,0,0,0.12);
    --good: #2e7d32;
    --warn: #f57c00;
    --bad: #c62828;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 12px 40px;
  }

  h1 {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.3rem;
    color: var(--primary);
    margin: 10px 0 6px;
    letter-spacing: 0.15em;
    text-align: center;
  }
  .school-name {
    font-size: 0.72rem;
    color: var(--muted);
    margin-bottom: 10px;
    letter-spacing: 0.1em;
  }

  /* タブ */
  .tab-bar {
    display: flex;
    gap: 0;
    border: 2px solid var(--primary);
    border-radius: 24px;
    overflow: hidden;
    margin-bottom: 14px;
  }
  .tab-btn {
    padding: 7px 16px;
    border: none;
    background: transparent;
    color: var(--primary);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.82rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab-btn.active { background: var(--primary); color: #fff; }

  /* セット選択 */
  .set-selector {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 12px;
    max-width: 700px;
  }
  .set-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 2px solid var(--primary);
    background: transparent;
    color: var(--primary);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .set-btn.active { background: var(--primary); color: #fff; }
  .set-btn:hover { opacity: 0.8; }

  .mastery-badge {
    display: inline-block;
    font-size: 0.65rem;
    padding: 1px 5px;
    border-radius: 8px;
    margin-left: 4px;
    font-weight: 700;
  }

  /* モード切替（3モード） */
  .mode-toggle {
    display: flex;
    gap: 0;
    border: 2px solid var(--primary);
    border-radius: 20px;
    overflow: hidden;
    margin-bottom: 12px;
  }
  .mode-btn {
    padding: 6px 12px;
    border: none;
    background: transparent;
    color: var(--primary);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .mode-btn.active { background: var(--primary); color: #fff; }

  /* 進捗 */
  .progress-bar {
    width: 100%;
    max-width: 420px;
    height: 6px;
    background: #ddd;
    border-radius: 3px;
    margin-bottom: 6px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.3s;
  }
  .progress-text {
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 10px;
  }

  /* 習得率バー */
  .mastery-bar-wrap {
    width: 100%;
    max-width: 420px;
    margin-bottom: 14px;
  }
  .mastery-bar-label {
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 4px;
    display: flex;
    justify-content: space-between;
  }
  .mastery-bar {
    height: 8px;
    background: #ddd;
    border-radius: 4px;
    overflow: hidden;
    display: flex;
  }
  .mastery-bar-good { background: var(--good); transition: width 0.3s; }
  .mastery-bar-warn { background: var(--warn); transition: width 0.3s; }
  .mastery-bar-bad  { background: var(--bad);  transition: width 0.3s; }

  /* ========== カード ========== */
  .card-wrapper {
    perspective: 1000px;
    width: 100%;
    max-width: 420px;
    height: 300px;
    cursor: pointer;
    margin-bottom: 16px;
  }
  .card {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4, 0.2, 0.2, 1);
    border-radius: 20px;
  }
  .card.flipped { transform: rotateY(180deg); }
  .card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px 24px;
    box-shadow: var(--shadow);
  }
  .card-front { background: var(--card-bg); border: 2px solid #e0dbd0; }
  .card-back  { background: var(--primary); transform: rotateY(180deg); color: #fff; }

  .card-label {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .card-back .card-label { color: rgba(255,255,255,0.6); }
  .card-number { font-size: 0.75rem; color: var(--accent); font-weight: 700; margin-bottom: 4px; }

  /* 表面：問題テキスト */
  .card-question {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--text);
    text-align: center;
    line-height: 1.7;
  }
  /* 四字熟語を大きく */
  .card-question.yoji {
    font-size: 2.6rem;
    font-weight: 900;
    letter-spacing: 0.08em;
    line-height: 1.2;
  }
  /* 意味モードの問題文 */
  .card-question.imi {
    font-size: 1rem;
    font-weight: 400;
    line-height: 1.8;
    color: #333;
  }
  .card-hint { font-size: 0.75rem; color: var(--muted); margin-top: 12px; }

  /* 裏面：解答 */
  .card-answer {
    font-family: 'Noto Serif JP', serif;
    font-size: 2.6rem;
    font-weight: 900;
    color: #fff;
    letter-spacing: 0.08em;
    line-height: 1.2;
    margin-bottom: 6px;
  }
  .card-reading {
    font-size: 1rem;
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.12em;
    margin-bottom: 8px;
  }
  .card-meaning {
    font-size: 0.78rem;
    color: rgba(255,255,255,0.75);
    text-align: center;
    line-height: 1.6;
    max-width: 100%;
    border-top: 1px solid rgba(255,255,255,0.25);
    padding-top: 8px;
    margin-top: 4px;
  }
  .card-example {
    font-size: 0.72rem;
    color: rgba(255,255,255,0.6);
    text-align: center;
    margin-top: 4px;
    font-style: italic;
  }

  /* 音声ボタン */
  .speak-btn {
    background: none;
    border: 1px solid rgba(255,255,255,0.4);
    border-radius: 20px;
    color: rgba(255,255,255,0.8);
    font-size: 0.75rem;
    padding: 3px 10px;
    cursor: pointer;
    margin-top: 6px;
    transition: all 0.2s;
  }
  .speak-btn:hover { background: rgba(255,255,255,0.15); }

  /* 自己採点ボタン */
  .judge-btns {
    display: none;
    gap: 12px;
    margin-bottom: 14px;
  }
  .judge-btns.show { display: flex; }
  .judge-btn {
    padding: 10px 24px;
    border-radius: 24px;
    border: none;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .judge-btn:hover { transform: scale(1.08); }
  .judge-btn.good { background: var(--good); color: #fff; }
  .judge-btn.warn { background: var(--warn); color: #fff; }
  .judge-btn.bad  { background: var(--bad);  color: #fff; }

  /* ナビゲーション */
  .nav-buttons {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 14px;
  }
  .nav-btn {
    width: 50px; height: 50px;
    border-radius: 50%;
    border: none;
    font-size: 1.3rem;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  .nav-btn.prev    { background: #e0dbd0; color: var(--text); }
  .nav-btn.next    { background: var(--accent); color: #fff; width: 58px; height: 58px; font-size: 1.5rem; }
  .nav-btn.shuffle { background: var(--primary); color: #fff; }
  .nav-btn.reset   { background: #9e9e9e; color: #fff; font-size: 1rem; }
  .nav-btn:hover   { transform: scale(1.08); }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  /* 完了メッセージ */
  .complete-msg {
    display: none;
    text-align: center;
    padding: 28px 24px;
    background: var(--card-bg);
    border-radius: 20px;
    box-shadow: var(--shadow);
    max-width: 420px;
    width: 100%;
  }
  .complete-msg.show { display: block; }
  .complete-msg h2 { font-family: 'Noto Serif JP', serif; color: var(--primary); font-size: 1.4rem; margin-bottom: 10px; }
  .result-row { display: flex; justify-content: center; gap: 20px; margin: 14px 0; }
  .result-item { text-align: center; }
  .result-item .count { font-size: 1.8rem; font-weight: 900; }
  .result-item .count.good { color: var(--good); }
  .result-item .count.warn { color: var(--warn); }
  .result-item .count.bad  { color: var(--bad); }
  .result-item .label { font-size: 0.75rem; color: var(--muted); }
  .restart-btn {
    padding: 11px 28px; background: var(--accent); color: #fff;
    border: none; border-radius: 24px;
    font-family: 'Noto Sans JP', sans-serif; font-size: 0.95rem; font-weight: 700;
    cursor: pointer; margin: 6px;
  }
  .review-btn {
    padding: 11px 28px; background: var(--bad); color: #fff;
    border: none; border-radius: 24px;
    font-family: 'Noto Sans JP', sans-serif; font-size: 0.95rem; font-weight: 700;
    cursor: pointer; margin: 6px;
  }

  /* ランキング・履歴 */
  .screen { display: none; width: 100%; max-width: 500px; }
  .screen.show { display: block; }

  .section-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.1rem;
    color: var(--primary);
    margin: 18px 0 10px;
    border-left: 4px solid var(--accent);
    padding-left: 10px;
  }

  .ranking-list, .history-list { width: 100%; }
  .ranking-item {
    display: flex; align-items: center; background: #fff;
    border-radius: 12px; padding: 10px 14px;
    margin-bottom: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); gap: 12px;
  }
  .rank-num { font-size: 1.1rem; font-weight: 900; color: var(--accent); min-width: 24px; }
  .rank-word { flex: 1; }
  .rank-word .kanji { font-family: 'Noto Serif JP', serif; font-size: 1.1rem; font-weight: 700; }
  .rank-word .yomi  { font-size: 0.75rem; color: var(--muted); }
  .rank-miss {
    font-size: 0.8rem; font-weight: 700; color: var(--bad);
    background: #fce4e4; padding: 3px 8px; border-radius: 10px;
  }

  .history-item {
    background: #fff; border-radius: 12px; padding: 10px 14px;
    margin-bottom: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); font-size: 0.85rem;
  }
  .history-item .hist-date { color: var(--muted); font-size: 0.75rem; margin-bottom: 4px; }
  .history-item .hist-score { display: flex; gap: 14px; }
  .hist-good { color: var(--good); font-weight: 700; }
  .hist-warn { color: var(--warn); font-weight: 700; }
  .hist-bad  { color: var(--bad);  font-weight: 700; }

  .clear-btn {
    padding: 8px 20px; background: #eee; color: #555;
    border: none; border-radius: 20px; font-size: 0.8rem; font-weight: 700;
    cursor: pointer; margin-top: 10px;
  }

  /* ========== 手書きタブ ========== */
  #tabWrite {
    display: flex !important;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    width: 100%;
    max-width: 100%;
    padding: 0 8px;
  }
  #tabWrite > * { width: 100%; }
  #tabWrite > .write-set-info,
  #tabWrite > .write-counter { text-align: center; }

  .write-set-info { font-size: 0.8rem; color: var(--muted); text-align: center; }
  .write-counter  { font-size: 0.85rem; color: var(--muted); text-align: center; }
  .write-progress { width: 100%; max-width: 500px; }

  .write-prompt-label {
    font-size: 0.75rem; color: var(--muted); text-align: center;
    letter-spacing: .05em; margin-bottom: 4px;
  }
  .write-prompt-text {
    font-family: 'Noto Serif JP', serif;
    font-size: clamp(1.2rem, 4.5vw, 1.8rem);
    font-weight: 700;
    color: var(--primary);
    text-align: center;
    line-height: 1.6;
  }
  .write-prompt-meaning {
    font-size: 0.78rem;
    color: var(--muted);
    text-align: center;
    margin-top: 4px;
    line-height: 1.5;
  }

  /* 横長キャンバス（四字熟語対応） */
  .write-canvas-wrap {
    position: relative;
    width: 100%;
    max-width: 100%;
  }
  #writeCanvas {
    width: 100% !important;
    height: auto !important;
    aspect-ratio: 5 / 2 !important;
    border-radius: 16px;
    background: #fff;
    border: 2px solid var(--primary);
    box-shadow: 0 4px 16px rgba(74,32,96,0.12);
    touch-action: none;
    cursor: crosshair;
    display: block;
  }

  .write-action-btns {
    display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
  }
  .write-action-btn {
    padding: 9px 20px; border-radius: 20px;
    border: 2px solid var(--primary); background: transparent;
    color: var(--primary); font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.85rem; font-weight: 700; cursor: pointer; transition: all .2s;
  }
  .write-action-btn:active { transform: scale(.95); }
  .write-action-btn.ai-btn { background: var(--primary); color: #fff; }
  .write-action-btn.ai-btn:disabled { opacity: .5; cursor: default; }
  .write-action-btn.next-btn { background: var(--accent); border-color: var(--accent); color: #fff; }

  .ai-result-box {
    width: 100%; max-width: 100%;
    border-radius: 16px; padding: 16px; text-align: center;
    border: 2px solid #ccc; background: #fff; display: none;
  }
  .ai-result-box.show { display: block; }
  .ai-result-box.correct { border-color: var(--good); background: #f1f8e9; }
  .ai-result-box.wrong   { border-color: var(--bad);  background: #fff3f3; }
  .ai-result-box.loading { border-color: var(--warn);  background: #fff8f0; }

  .ai-result-icon { font-size: 2.4rem; margin-bottom: 4px; }
  .ai-result-msg  { font-family: 'Noto Serif JP', serif; font-size: 1.1rem; font-weight: 700; color: var(--text); }
  .ai-result-detail { font-size: 0.78rem; color: var(--muted); margin: 6px 0 10px; min-height: 1.2em; }

  .ai-score-btns { display: flex; gap: 12px; justify-content: center; }
  .ai-score-btn {
    padding: 9px 24px; border-radius: 12px; border: none;
    font-size: 1rem; font-weight: 700; cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif; transition: transform .15s;
  }
  .ai-score-btn:active { transform: scale(.93); }
  .ai-score-btn.ok { background: var(--good); color: #fff; }
  .ai-score-btn.ng { background: var(--bad);  color: #fff; }

  .write-answer-box {
    width: 100%; max-width: 100%;
    padding: 14px; border-radius: 16px;
    background: #f3eeff; border: 2px solid var(--primary);
    text-align: center; display: none;
  }
  .write-answer-box.show { display: block; }
  .write-answer-label { font-size: 0.72rem; color: var(--primary); letter-spacing: .08em; margin-bottom: 4px; }
  .write-answer-kanji {
    font-family: 'Noto Serif JP', serif;
    font-size: clamp(2rem, 8vw, 3rem);
    font-weight: 700; color: var(--text);
    letter-spacing: 0.1em;
  }
  .write-answer-reading { font-size: 0.85rem; color: var(--muted); margin-top: 4px; }
  .write-answer-meaning { font-size: 0.78rem; color: #555; margin-top: 6px; line-height: 1.5; }
  .write-self-btns { display: flex; gap: 12px; justify-content: center; margin-top: 10px; }
  .write-self-btn {
    padding: 9px 24px; border-radius: 12px; border: none;
    font-size: 1rem; font-weight: 700; cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .write-self-btn.ok { background: var(--good); color: #fff; }
  .write-self-btn.ng { background: var(--bad);  color: #fff; }

  .write-complete {
    width: 100%; max-width: 400px; text-align: center;
    padding: 24px; background: #fff; border-radius: 16px;
    border: 2px solid var(--primary); display: none;
  }
  .write-complete.show { display: block; }
  .write-complete h3 { font-family: 'Noto Serif JP', serif; color: var(--primary); margin-bottom: 12px; }

  @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  .spin { display: inline-block; animation: spin 1s linear infinite; }

  /* APIキーモーダル */
  .api-modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.5); z-index: 1000;
    align-items: center; justify-content: center;
  }
  .api-modal-overlay.show { display: flex; }
  .api-modal {
    background: #fff; border-radius: 16px; padding: 24px;
    width: 90%; max-width: 400px; box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  }
  .api-modal h3 { font-family: 'Noto Serif JP', serif; color: var(--primary); margin-bottom: 12px; font-size: 1.1rem; }
  .api-modal p  { font-size: 0.8rem; color: var(--muted); margin-bottom: 16px; line-height: 1.6; }
  .api-modal input {
    width: 100%; padding: 10px 12px; border: 2px solid var(--primary);
    border-radius: 8px; font-size: 0.85rem; font-family: 'Noto Sans JP', sans-serif;
    margin-bottom: 12px; outline: none;
  }
  .api-modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
  .api-modal-save {
    padding: 8px 20px; background: var(--primary); color: #fff; border: none;
    border-radius: 8px; font-family: 'Noto Sans JP', sans-serif;
    font-weight: 700; cursor: pointer; font-size: 0.9rem;
  }
  .api-modal-skip {
    padding: 8px 16px; background: transparent; color: var(--muted);
    border: 1px solid var(--muted); border-radius: 8px;
    font-family: 'Noto Sans JP', sans-serif; cursor: pointer; font-size: 0.9rem;
  }
  .api-key-indicator {
    font-size: 0.72rem; color: var(--muted); text-align: center;
    margin-bottom: 8px; cursor: pointer; text-decoration: underline;
  }

  /* ========== レスポンシブ ========== */
  @media (min-width: 600px) {
    h1 { font-size: 1.7rem; }
    .set-btn { font-size: 1rem; padding: 8px 20px; }
    .progress-bar, .mastery-bar-wrap { max-width: 680px; }
    .progress-text { font-size: 1rem; }
    .card-wrapper { max-width: 680px !important; height: 360px !important; }
    .card-question { font-size: 1.5rem !important; }
    .card-question.yoji { font-size: 3.2rem !important; }
    .card-question.imi  { font-size: 1.1rem !important; }
    .card-answer { font-size: 3.2rem !important; }
    .card-reading { font-size: 1.4rem !important; }
    .card-meaning { font-size: 0.88rem !important; }
    .card-hint { font-size: 1rem; }
    .nav-btn { width: 68px; height: 68px; font-size: 1.8rem; }
    .nav-btn.next { width: 80px !important; height: 80px !important; font-size: 2rem !important; }
    .mode-btn { font-size: 0.9rem; padding: 8px 16px; }
    .judge-btn { font-size: 1.3rem; padding: 12px 32px; }
    .complete-msg { max-width: 680px; }
    .screen { max-width: 680px; }
  }
  @media (min-width: 900px) {
    .card-wrapper { max-width: 800px !important; height: 420px !important; }
    .card-question.yoji { font-size: 4rem !important; }
    .card-answer { font-size: 4rem !important; }
    .card-reading { font-size: 1.8rem !important; }
  }

  /* スマホ横向き */
  @media (orientation: landscape) and (max-width: 767px) {
    body { padding: 2px 8px 4px; }
    h1 { font-size: 0.85rem; margin: 2px 0 2px; }
    .school-name { display: none; }
    .tab-btn { padding: 3px 8px; font-size: 0.68rem; }
    .api-key-indicator { padding: 2px 8px; font-size: 0.7rem; }
    .card-wrapper { height: 150px; }
    .card-question.yoji { font-size: 1.6rem !important; }
    .card-answer { font-size: 1.5rem !important; }
    .mode-btn { font-size: 0.65rem; padding: 4px 8px; }
    #writeCanvas { aspect-ratio: 5 / 1.2 !important; }
    .write-action-btn { padding: 5px 10px; font-size: 0.75rem; }
    #tabWrite { gap: 4px; }
    .write-prompt-text { font-size: clamp(0.9rem, 2.8vw, 1.3rem); }
  }

  /* iPad横向き */
  @media (orientation: landscape) and (min-width: 768px) {
    body { padding: 8px 20px 16px; max-width: 100%; }
    h1 { font-size: 1.05rem; margin: 4px 0 6px; }
    .tab-btn { padding: 5px 12px; font-size: 0.75rem; }
    .set-selector { gap: 5px; margin-bottom: 6px; }
    .set-btn { padding: 3px 9px; font-size: 0.72rem; }

    #tabStudy {
      display: grid !important;
      grid-template-columns: 1fr 1fr;
      column-gap: 20px;
      align-items: start;
      width: 100%; max-width: 960px;
    }
    #tabStudy > .set-selector     { grid-column: 1 / -1; }
    #tabStudy > .mode-toggle      { grid-column: 2; grid-row: 2; justify-self: start; }
    #tabStudy > .progress-bar     { grid-column: 1; grid-row: 2; }
    #tabStudy > .progress-text    { grid-column: 1; grid-row: 3; }
    #tabStudy > .mastery-bar-wrap { grid-column: 1; grid-row: 4; }
    #tabStudy > .card-wrapper     { grid-column: 2; grid-row: 3; max-width: 100%; height: 240px; margin-bottom: 8px; }
    #tabStudy > .judge-btns       { grid-column: 2; grid-row: 4; }
    #tabStudy > .nav-buttons      { grid-column: 2; grid-row: 5; }
    #tabStudy > .complete-msg     { grid-column: 1 / -1; }
    .card-answer   { font-size: 2.2rem !important; }
    .card-question { font-size: 1.1rem !important; }
    .card-question.yoji { font-size: 2.2rem !important; }
    .progress-bar, .mastery-bar-wrap { max-width: 100%; }

    #tabWrite {
      display: grid !important;
      grid-template-columns: 1fr 1fr;
      column-gap: 20px;
      align-items: start;
      width: 100%; max-width: 960px;
    }
    #tabWrite > .write-set-info    { grid-column: 1 / -1; }
    #tabWrite > .write-counter     { grid-column: 1; }
    #tabWrite > .write-progress    { grid-column: 1; }
    #tabWrite > .write-canvas-wrap { grid-column: 1; max-width: 100%; }

    #tabWrite > .write-action-btns { grid-column: 2; }

    #tabWrite > .write-answer-box  { grid-column: 2; }

    #writeCanvas { width: 100%; }
    .write-prompt-text { font-size: 1.5rem; }
    #tabRanking, #tabHistory { max-width: 960px; }
  }
</style>
</head>
<body>

<!-- APIキーモーダル -->
<div class="api-modal-overlay" id="apiModal">
  <div class="api-modal">
    <h3>🔑 OpenAI APIキーの設定</h3>
    <p>AI手書き判定機能を使うには、OpenAI APIキーが必要です。<br>キーは端末に保存され、外部に送信されません。<br><br>
    👉 <a href="https://platform.openai.com/api-keys" target="_blank" style="color:var(--primary)">platform.openai.com</a> で取得できます。</p>
    <input type="password" id="apiKeyInput" placeholder="sk-proj-..." />
    <div class="api-modal-btns">
      <button class="api-modal-skip" onclick="skipApiKey()">あとで</button>
      <button class="api-modal-save" onclick="saveApiKey()">保存して使う</button>
    </div>
  </div>
</div>

<h1>📖 四字熟語フラッシュカード</h1>
<div class="school-name">創才学院</div>
<div class="api-key-indicator" id="apiKeyIndicator" onclick="showApiModal()">🔑 APIキー未設定（タップして設定）</div>

<!-- タブ -->
<div class="tab-bar">
  <button class="tab-btn active" onclick="showTab('study')">学習</button>
  <button class="tab-btn" onclick="showTab('ranking')">苦手ランキング</button>
  <button class="tab-btn" onclick="showTab('history')">学習履歴</button>
  <button class="tab-btn" onclick="showTab('write')">✏️ 手書き</button>
</div>

<!-- ===== 学習タブ ===== -->
<div id="tabStudy" class="screen show">
  <div class="set-selector" id="setSelector"></div>

  <!-- モード切替（3種類） -->
  <div class="mode-toggle">
    <button class="mode-btn active" id="modeYomi" onclick="setMode('yomi')">読み→漢字</button>
    <button class="mode-btn" id="modeKanji" onclick="setMode('kanji')">漢字→読み</button>
    <button class="mode-btn" id="modeImi" onclick="setMode('imi')">意味→四字熟語</button>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-text" id="progressText">1 / 1</div>

  <div class="mastery-bar-wrap">
    <div class="mastery-bar-label">
      <span>習得率</span>
      <span id="masteryPct">-</span>
    </div>
    <div class="mastery-bar">
      <div class="mastery-bar-good" id="barGood" style="width:0%"></div>
      <div class="mastery-bar-warn" id="barWarn" style="width:0%"></div>
      <div class="mastery-bar-bad"  id="barBad"  style="width:0%"></div>
    </div>
  </div>

  <div class="card-wrapper" id="cardWrapper" onclick="flipCard()">
    <div class="card" id="card">
      <div class="card-face card-front">
        <div class="card-label" id="frontLabel">問題</div>
        <div class="card-number" id="cardNumber"></div>
        <div class="card-question" id="cardQuestion"></div>
        <div class="card-hint">タップしてめくる</div>
      </div>
      <div class="card-face card-back">
        <div class="card-label" id="backLabel">解答</div>
        <div class="card-answer"  id="cardAnswer"></div>
        <div class="card-reading" id="cardReading"></div>
        <div class="card-meaning" id="cardMeaning"></div>
        <div class="card-example" id="cardExample"></div>
        <button class="speak-btn" onclick="speakCurrent(event)">🔊 もう一度</button>
      </div>
    </div>
  </div>

  <div class="judge-btns" id="judgeBtns">
    <button class="judge-btn good" onclick="judge('good')">○</button>
    <button class="judge-btn warn" onclick="judge('warn')">△</button>
    <button class="judge-btn bad"  onclick="judge('bad')">×</button>
  </div>

  <div class="nav-buttons">
    <button class="nav-btn prev"    id="prevBtn"    onclick="prevCard()">←</button>
    <button class="nav-btn shuffle" id="shuffleBtn" onclick="shuffleCards()" title="シャッフル">🔀</button>
    <button class="nav-btn reset"   id="resetBtn"   onclick="resetOrder()" title="順番をリセット">↺</button>
    <button class="nav-btn next"    id="nextBtn"    onclick="nextCard()">→</button>
  </div>

  <div class="complete-msg" id="completeMsg">
    <h2>🎉 完了！</h2>
    <div class="result-row">
      <div class="result-item"><div class="count good" id="resultGood">0</div><div class="label">○ 正解</div></div>
      <div class="result-item"><div class="count warn" id="resultWarn">0</div><div class="label">△ 惜しい</div></div>
      <div class="result-item"><div class="count bad"  id="resultBad">0</div><div class="label">× ミス</div></div>
    </div>
    <button class="restart-btn" onclick="restart()">もう一度</button>
    <button class="review-btn"  onclick="startReview()" id="reviewBtn">× の問題を復習</button>
  </div>
</div>

<!-- ===== 苦手ランキングタブ ===== -->
<div id="tabRanking" class="screen">
  <div class="section-title">苦手ランキング（ミス回数順）</div>
  <div class="ranking-list" id="rankingList"></div>
  <button class="clear-btn" onclick="clearHistory()">履歴をリセット</button>
</div>

<!-- ===== 学習履歴タブ ===== -->
<div id="tabHistory" class="screen">
  <div class="section-title">学習履歴</div>
  <div class="history-list" id="historyList"></div>
  <button class="clear-btn" onclick="clearHistory()">履歴をリセット</button>
</div>

<!-- ===== 手書き練習タブ ===== -->
<div id="tabWrite" class="screen">
  <div class="write-set-info" id="writeSetInfo">セット A</div>
  <div class="write-counter" id="writeCounter">1 / 20</div>
  <div class="write-progress progress-bar">
    <div class="progress-fill" id="writeProgressFill" style="width:0%"></div>
  </div>

  <div>
    <div class="write-prompt-label">この読みの四字熟語を書いてください</div>
    <div class="write-prompt-text" id="writePrompt">—</div>
    <div class="write-prompt-meaning" id="writePromptMeaning"></div>
  </div>

  <div class="write-canvas-wrap">
    <canvas id="writeCanvas" width="1000" height="400"></canvas>
  </div>

  <div class="write-action-btns">
    <button class="write-action-btn" onclick="clearWriteCanvas()">🗑 消す</button>
    <button class="write-action-btn" onclick="showWriteAnswer()">💡 答えを見る</button>
    <button class="write-action-btn ai-btn" id="aiJudgeBtn" onclick="aiJudge()">🤖 AI判定</button>
    <button class="write-action-btn next-btn" onclick="nextWriteCard()">次へ ▶</button>
  </div>

  <div class="ai-result-box" id="aiResultBox">
    <div class="ai-result-icon" id="aiResultIcon">—</div>
    <div class="ai-result-msg" id="aiResultMsg">判定中…</div>
    <div class="ai-result-detail" id="aiResultDetail"></div>
    <div class="ai-score-btns" id="aiScoreBtns" style="display:none">
      <button class="ai-score-btn ng" onclick="writeScore('bad')">× もう一度</button>
      <button class="ai-score-btn ok" onclick="writeScore('good')">○ 次へ</button>
    </div>
  </div>

  <div class="write-answer-box" id="writeAnswerBox">
    <div class="write-answer-label">正解</div>
    <div class="write-answer-kanji"   id="writeAnswerKanji">—</div>
    <div class="write-answer-reading" id="writeAnswerReading"></div>
    <div class="write-answer-meaning" id="writeAnswerMeaning"></div>
    <div class="write-self-btns">
      <button class="write-self-btn ng" onclick="writeScore('bad')">× ちがう</button>
      <button class="write-self-btn ok" onclick="writeScore('good')">○ できた！</button>
    </div>
  </div>

  <div class="write-complete" id="writeComplete">
    <h3>🎉 手書き練習 完了！</h3>
    <div id="writeCompleteStats" style="margin:12px 0; font-size:1rem;"></div>
    <button class="write-action-btn" onclick="restartWrite()">もう一度</button>
  </div>
</div>

<script>
// ============================================================
// データ（四字熟語）
// k: 四字熟語, r: 読み, m: 意味, e: 用例
// ============================================================
const ALL_DATA = {
  "A": [
    {k:"一石二鳥", r:"いっせきにちょう", m:"一つの行動で二つの利益を得ること", e:"通学路の清掃をして運動にもなり一石二鳥だ。"},
    {k:"七転八起", r:"しちてんはっき",   m:"何度失敗しても立ち上がること。不屈の精神", e:"七転八起の精神で資格試験に挑み続けた。"},
    {k:"以心伝心", r:"いしんでんしん",   m:"言葉を使わずに心が通じ合うこと", e:"長年の友人とは以心伝心で話が通じる。"},
    {k:"一期一会", r:"いちごいちえ",     m:"一生に一度の出会いを大切にすること", e:"旅先での出会いは一期一会だと感じた。"},
    {k:"自業自得", r:"じごうじとく",     m:"自分の行いの結果を自分で受けること", e:"準備を怠った結果は自業自得だ。"},
    {k:"四面楚歌", r:"しめんそか",       m:"周囲が全て敵・味方がいない孤立した状況", e:"反対意見ばかりで四面楚歌の状態だった。"},
    {k:"温故知新", r:"おんこちしん",     m:"古いことを学び直して新しい知識を得ること", e:"温故知新の姿勢で古典を読み返す。"},
    {k:"起死回生", r:"きしかいせい",     m:"絶望的な状況を立て直すこと", e:"起死回生の一手で逆転に成功した。"},
    {k:"臨機応変", r:"りんきおうへん",   m:"その場の状況に応じて柔軟に対応すること", e:"臨機応変に対応できる人材が求められる。"},
    {k:"天真爛漫", r:"てんしんらんまん", m:"純粋で飾り気がなく明るい様子", e:"天真爛漫な笑顔が周囲を和ませた。"},
  ],
  "B": [
    {k:"針小棒大", r:"しんしょうぼうだい", m:"小さなことを大げさに言うこと", e:"針小棒大に話すので信用されなかった。"},
    {k:"半信半疑", r:"はんしんはんぎ",     m:"信じる気持ちと疑う気持ちが半々な状態", e:"その話を半信半疑で聞いていた。"},
    {k:"不言実行", r:"ふげんじっこう",     m:"あれこれ言わずに黙って実行すること", e:"不言実行を旨として仕事に取り組んだ。"},
    {k:"有言実行", r:"ゆうげんじっこう",   m:"言ったことを必ず実行すること", e:"有言実行を心がけて目標を達成した。"},
    {k:"大器晩成", r:"たいきばんせい",     m:"大きな人物は遅れて大成するということ", e:"大器晩成型で三十代から才能が開花した。"},
    {k:"切磋琢磨", r:"せっさたくま",       m:"仲間と互いに励まし合い努力すること", e:"チームで切磋琢磨して実力を伸ばした。"},
    {k:"一進一退", r:"いっしんいったい",   m:"良くなったり悪くなったりすること", e:"病状は一進一退を繰り返した。"},
    {k:"自由自在", r:"じゆうじざい",       m:"思うままに振る舞えること", e:"楽器を自由自在に演奏する。"},
    {k:"前代未聞", r:"ぜんだいみもん",     m:"これまでに聞いたことがない珍しいこと", e:"前代未聞の大記録が誕生した。"},
    {k:"一刀両断", r:"いっとうりょうだん", m:"物事を思いきりよく決断・処理すること", e:"長引く議論を一刀両断に打ち切った。"},
  ],
  "全問": null,
};

// 全問セットの参照セット一覧（「全問」以外のセット名）
const REAL_SETS = Object.keys(ALL_DATA).filter(s => s !== "全問");

// ============================================================
// 状態
// ============================================================
const SETS = [...REAL_SETS, "全問"];
let currentSet = REAL_SETS[0];
let currentCards = [];
let originalCards = [];
let currentIndex = 0;
let isFlipped = false;
let mode = "yomi";   // "yomi" | "kanji" | "imi"
let isShuffled = false;
let isReviewMode = false;
let sessionResults = {};

// ============================================================
// localStorage
// ============================================================
function loadStats()   { try { return JSON.parse(localStorage.getItem('yojiStats')   || '{}'); } catch(e) { return {}; } }
function saveStats(s)  { localStorage.setItem('yojiStats',   JSON.stringify(s)); }
function loadHistory() { try { return JSON.parse(localStorage.getItem('yojiHistory') || '[]'); } catch(e) { return []; } }
function saveHistory(h){ localStorage.setItem('yojiHistory', JSON.stringify(h)); }

// ============================================================
// 初期化
// ============================================================
function init() {
  const sel = document.getElementById("setSelector");
  SETS.forEach(s => {
    const btn = document.createElement("button");
    btn.id = "setBtn_" + s;
    btn.className = "set-btn" + (s === currentSet ? " active" : "");
    btn.onclick = () => selectSet(s);
    sel.appendChild(btn);
  });
  updateSetBtnLabels();
  loadSet(currentSet);
}

function updateSetBtnLabels() {
  const stats = loadStats();
  SETS.forEach(s => {
    const btn = document.getElementById("setBtn_" + s);
    if (!btn) return;
    const keys = getSetKeys(s);
    const total = keys.length;
    const good = keys.filter(k => stats[k] && stats[k].good > stats[k].bad).length;
    const pct = total ? Math.round(good / total * 100) : 0;
    const color = pct >= 80 ? '#2e7d32' : pct >= 50 ? '#f57c00' : '#c62828';
    btn.innerHTML = s + `<span class="mastery-badge" style="background:${color};color:#fff">${pct}%</span>`;
  });
}

function getSetKeys(setName) {
  if (setName === "全問") {
    return REAL_SETS.flatMap(s => ALL_DATA[s].map((_, i) => s + "-" + (i + 1)));
  }
  return (ALL_DATA[setName] || []).map((_, i) => setName + "-" + (i + 1));
}

// ============================================================
// セット・カード構築
// ============================================================
function buildCards(setName) {
  if (setName === "全問") {
    let all = [];
    REAL_SETS.forEach(s => {
      ALL_DATA[s].forEach((c, i) => all.push({ ...c, set: s, num: i + 1 }));
    });
    return all;
  }
  return ALL_DATA[setName].map((c, i) => ({ ...c, set: setName, num: i + 1 }));
}

function selectSet(setName) {
  currentSet = setName;
  isReviewMode = false;
  document.querySelectorAll(".set-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("setBtn_" + setName).classList.add("active");
  loadSet(setName);
}

function loadSet(setName) {
  currentCards = buildCards(setName);
  originalCards = [...currentCards];
  isShuffled = false;
  currentIndex = 0;
  sessionResults = {};
  document.getElementById("completeMsg").classList.remove("show");
  document.getElementById("cardWrapper").style.display = "";
  showCard();
}

function shuffleCards() {
  const arr = [...currentCards];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  currentCards = arr;
  isShuffled = true;
  currentIndex = 0;
  sessionResults = {};
  showCard();
}

function resetOrder() {
  currentCards = buildCards(currentSet);
  originalCards = [...currentCards];
  isShuffled = false;
  currentIndex = 0;
  sessionResults = {};
  document.getElementById("completeMsg").classList.remove("show");
  document.getElementById("cardWrapper").style.display = "";
  showCard();
}

function startReview() {
  const stats = loadStats();
  const badCards = currentCards.filter(c => {
    const key = c.set + "-" + c.num;
    const s = stats[key];
    return s && s.bad > 0;
  });
  if (badCards.length === 0) { alert("ミスした問題がありません！"); return; }
  isReviewMode = true;
  currentCards = badCards;
  currentIndex = 0;
  sessionResults = {};
  document.getElementById("completeMsg").classList.remove("show");
  document.getElementById("cardWrapper").style.display = "";
  showCard();
}

// ============================================================
// カード表示
// ============================================================
function showCard() {
  isFlipped = false;
  document.getElementById("card").classList.remove("flipped");
  document.getElementById("judgeBtns").classList.remove("show");

  const card = currentCards[currentIndex];
  const total = currentCards.length;

  document.getElementById("progressFill").style.width = ((currentIndex + 1) / total * 100) + "%";
  document.getElementById("progressText").textContent = (isReviewMode ? "【復習】" : "") + `${currentIndex + 1} / ${total}`;
  document.getElementById("prevBtn").disabled = currentIndex === 0;
  document.getElementById("nextBtn").disabled = false;
  document.getElementById("cardNumber").textContent = `${card.set}-${card.num}`;

  const qEl = document.getElementById("cardQuestion");
  const aEl = document.getElementById("cardAnswer");
  const rEl = document.getElementById("cardReading");
  const mEl = document.getElementById("cardMeaning");
  const eEl = document.getElementById("cardExample");

  if (mode === "yomi") {
    // 表：読み　裏：四字熟語＋意味
    document.getElementById("frontLabel").textContent = "読み";
    document.getElementById("backLabel").textContent  = "四字熟語";
    qEl.textContent = card.r;
    qEl.className = "card-question";
    aEl.textContent = card.k;
    rEl.textContent = card.r;
    mEl.textContent = card.m;
    eEl.textContent = card.e ? "例：" + card.e : "";
  } else if (mode === "kanji") {
    // 表：四字熟語　裏：読み＋意味
    document.getElementById("frontLabel").textContent = "四字熟語";
    document.getElementById("backLabel").textContent  = "読み";
    qEl.textContent = card.k;
    qEl.className = "card-question yoji";
    aEl.textContent = card.r;
    rEl.textContent = "";
    mEl.textContent = card.m;
    eEl.textContent = card.e ? "例：" + card.e : "";
  } else {
    // 意味→四字熟語モード
    document.getElementById("frontLabel").textContent = "意味";
    document.getElementById("backLabel").textContent  = "四字熟語";
    qEl.textContent = card.m + (card.e ? "\n\n例：" + card.e : "");
    qEl.className = "card-question imi";
    aEl.textContent = card.k;
    rEl.textContent = card.r;
    mEl.textContent = card.m;
    eEl.textContent = "";
  }

  updateMasteryBar();
}

function updateMasteryBar() {
  const stats = loadStats();
  const total = currentCards.length;
  let good = 0, warn = 0, bad = 0;
  currentCards.forEach(c => {
    const key = c.set + "-" + c.num;
    const s = stats[key];
    if (!s) return;
    if (s.good > s.bad) good++;
    else if (s.bad > 0) bad++;
    else warn++;
  });
  document.getElementById("barGood").style.width = (good / total * 100).toFixed(0) + "%";
  document.getElementById("barWarn").style.width = (warn / total * 100).toFixed(0) + "%";
  document.getElementById("barBad").style.width  = (bad  / total * 100).toFixed(0) + "%";
  document.getElementById("masteryPct").textContent = `○${good} △${warn} ×${bad} / ${total}問`;
}

// ============================================================
// カードめくり・採点
// ============================================================
function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById("card").classList.toggle("flipped", isFlipped);
  if (isFlipped) {
    const card = currentCards[currentIndex];
    speak(card.r + "　" + card.k);
    document.getElementById("judgeBtns").classList.add("show");
  } else {
    document.getElementById("judgeBtns").classList.remove("show");
  }
}

function speakCurrent(e) {
  e.stopPropagation();
  const card = currentCards[currentIndex];
  speak(card.r + "　" + card.k);
}

function speak(text) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = "ja-JP";
  utter.rate = 0.85;
  speechSynthesis.speak(utter);
}

function judge(result) {
  const card = currentCards[currentIndex];
  const key = card.set + "-" + card.num;
  sessionResults[key] = result;
  const stats = loadStats();
  if (!stats[key]) stats[key] = { good: 0, warn: 0, bad: 0, word: card.k, reading: card.r };
  stats[key][result]++;
  saveStats(stats);
  updateMasteryBar();
  updateSetBtnLabels();
  nextCard();
}

// ============================================================
// ナビ
// ============================================================
function nextCard() {
  document.getElementById("judgeBtns").classList.remove("show");
  if (currentIndex < currentCards.length - 1) {
    currentIndex++;
    showCard();
  } else {
    showComplete();
  }
}

function prevCard() {
  document.getElementById("judgeBtns").classList.remove("show");
  if (currentIndex > 0) {
    currentIndex--;
    showCard();
  }
}

function showComplete() {
  let good = 0, warn = 0, bad = 0;
  Object.values(sessionResults).forEach(r => {
    if (r === 'good') good++;
    else if (r === 'warn') warn++;
    else bad++;
  });
  document.getElementById("resultGood").textContent = good;
  document.getElementById("resultWarn").textContent = warn;
  document.getElementById("resultBad").textContent  = bad;
  document.getElementById("reviewBtn").style.display = bad > 0 ? "" : "none";

  const history = loadHistory();
  history.unshift({
    date: new Date().toLocaleString('ja-JP'),
    set: isReviewMode ? currentSet + "(復習)" : currentSet,
    good, warn, bad, total: currentCards.length
  });
  if (history.length > 50) history.pop();
  saveHistory(history);

  document.getElementById("cardWrapper").style.display = "none";
  document.getElementById("judgeBtns").classList.remove("show");
  document.getElementById("completeMsg").classList.add("show");
}

function restart() {
  currentIndex = 0;
  sessionResults = {};
  document.getElementById("completeMsg").classList.remove("show");
  document.getElementById("cardWrapper").style.display = "";
  showCard();
}

// ============================================================
// モード切替
// ============================================================
function setMode(m) {
  mode = m;
  document.getElementById("modeYomi").classList.toggle("active",  m === "yomi");
  document.getElementById("modeKanji").classList.toggle("active", m === "kanji");
  document.getElementById("modeImi").classList.toggle("active",   m === "imi");
  showCard();
}

// ============================================================
// タブ
// ============================================================
function showTab(tab) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("show"));
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  const tabBtns = document.querySelectorAll(".tab-btn");
  if (tab === "study") {
    document.getElementById("tabStudy").classList.add("show");
    tabBtns[0].classList.add("active");
  } else if (tab === "ranking") {
    document.getElementById("tabRanking").classList.add("show");
    tabBtns[1].classList.add("active");
    renderRanking();
  } else if (tab === "history") {
    document.getElementById("tabHistory").classList.add("show");
    tabBtns[2].classList.add("active");
    renderHistory();
  } else if (tab === "write") {
    document.getElementById("tabWrite").classList.add("show");
    tabBtns[3].classList.add("active");
    initWrite();
  }
}

// ============================================================
// ランキング・履歴
// ============================================================
function renderRanking() {
  const stats = loadStats();
  const items = Object.entries(stats)
    .map(([key, s]) => ({ key, ...s }))
    .filter(s => s.bad > 0)
    .sort((a, b) => b.bad - a.bad)
    .slice(0, 20);

  const el = document.getElementById("rankingList");
  if (items.length === 0) {
    el.innerHTML = '<p style="color:#888;text-align:center;padding:20px">まだミスした問題がありません</p>';
    return;
  }
  el.innerHTML = items.map((s, i) => `
    <div class="ranking-item">
      <div class="rank-num">${i + 1}</div>
      <div class="rank-word">
        <div class="kanji">${s.word || s.key}</div>
        <div class="yomi">${s.reading || ""}</div>
      </div>
      <div class="rank-miss">× ${s.bad}回</div>
    </div>
  `).join("");
}

function renderHistory() {
  const history = loadHistory();
  const el = document.getElementById("historyList");
  if (history.length === 0) {
    el.innerHTML = '<p style="color:#888;text-align:center;padding:20px">学習履歴がありません</p>';
    return;
  }
  el.innerHTML = history.map(h => `
    <div class="history-item">
      <div class="hist-date">${h.date}　セット：${h.set}　全${h.total}問</div>
      <div class="hist-score">
        <span class="hist-good">○ ${h.good}</span>
        <span class="hist-warn">△ ${h.warn}</span>
        <span class="hist-bad">× ${h.bad}</span>
      </div>
    </div>
  `).join("");
}

function clearHistory() {
  if (!confirm("履歴・採点データをすべてリセットしますか？")) return;
  localStorage.removeItem('yojiStats');
  localStorage.removeItem('yojiHistory');
  updateSetBtnLabels();
  updateMasteryBar();
  renderRanking();
  renderHistory();
  alert("リセットしました");
}

// ============================================================
// 起動
// ============================================================
init();

// ============================================================
// APIキー管理
// ============================================================
let OPENAI_API_KEY = localStorage.getItem("openai_api_key") || "";

function showApiModal() {
  document.getElementById('apiModal').classList.add('show');
  document.getElementById('apiKeyInput').value = localStorage.getItem('openai_api_key') || '';
}
function saveApiKey() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key) { alert('APIキーを入力してください'); return; }
  OPENAI_API_KEY = key;
  localStorage.setItem('openai_api_key', key);
  document.getElementById('apiModal').classList.remove('show');
  updateApiKeyIndicator();
  alert('APIキーを保存しました！');
}
function skipApiKey() {
  document.getElementById('apiModal').classList.remove('show');
}
function updateApiKeyIndicator() {
  const el = document.getElementById('apiKeyIndicator');
  if (!el) return;
  if (OPENAI_API_KEY) {
    el.textContent = '🔑 APIキー設定済（タップして変更）';
    el.style.color = 'var(--good)';
  } else {
    el.textContent = '🔑 APIキー未設定（タップして設定）';
    el.style.color = 'var(--bad)';
  }
}

window.addEventListener('load', () => {
  OPENAI_API_KEY = localStorage.getItem('openai_api_key') || '';
  updateApiKeyIndicator();
  if (!OPENAI_API_KEY) setTimeout(showApiModal, 500);
});

// ============================================================
// 手書きモード
// ============================================================
let writeDeck = [];
let writeIndex = 0;
let writeDrawing = false;
let writeLX = 0, writeLY = 0;
let writeAnswerShown = false;

function initWrite() {
  writeDeck = buildCards(currentSet);
  writeIndex = 0;
  writeAnswerShown = false;
  setupWriteCanvas();
  renderWriteCard();
  document.getElementById('writeComplete').classList.remove('show');
}

function setupWriteCanvas() {
  const canvas = document.getElementById('writeCanvas');
  const newCanvas = canvas.cloneNode(true);
  canvas.parentNode.replaceChild(newCanvas, canvas);
  const ctx = newCanvas.getContext('2d');
  ctx.strokeStyle = '#2a0a40';
  ctx.lineWidth = 7;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  newCanvas.addEventListener('mousedown',  e => { writeDrawing = true; writeLX = e.offsetX; writeLY = e.offsetY; });
  newCanvas.addEventListener('mousemove',  e => {
    if (!writeDrawing) return;
    ctx.beginPath(); ctx.moveTo(writeLX, writeLY); ctx.lineTo(e.offsetX, e.offsetY); ctx.stroke();
    writeLX = e.offsetX; writeLY = e.offsetY;
  });
  newCanvas.addEventListener('mouseup',    () => writeDrawing = false);
  newCanvas.addEventListener('mouseleave', () => writeDrawing = false);

  newCanvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const r = newCanvas.getBoundingClientRect(), t = e.touches[0];
    const sx = newCanvas.width / r.width, sy = newCanvas.height / r.height;
    writeDrawing = true;
    writeLX = (t.clientX - r.left) * sx;
    writeLY = (t.clientY - r.top) * sy;
  }, { passive: false });
  newCanvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (!writeDrawing) return;
    const r = newCanvas.getBoundingClientRect(), t = e.touches[0];
    const sx = newCanvas.width / r.width, sy = newCanvas.height / r.height;
    const x = (t.clientX - r.left) * sx, y = (t.clientY - r.top) * sy;
    ctx.beginPath(); ctx.moveTo(writeLX, writeLY); ctx.lineTo(x, y); ctx.stroke();
    writeLX = x; writeLY = y;
  }, { passive: false });
  newCanvas.addEventListener('touchend', () => writeDrawing = false);
}

function clearWriteCanvas() {
  const canvas = document.getElementById('writeCanvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = '#2a0a40';
  ctx.lineWidth = 7;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
}

function renderWriteCard() {
  if (!writeDeck.length) return;
  const card = writeDeck[writeIndex];
  document.getElementById('writeSetInfo').textContent = 'セット ' + currentSet;
  document.getElementById('writeCounter').textContent = (writeIndex + 1) + ' / ' + writeDeck.length;
  document.getElementById('writeProgressFill').style.width = ((writeIndex + 1) / writeDeck.length * 100) + '%';
  document.getElementById('writePrompt').textContent = card.r;
  document.getElementById('writePromptMeaning').textContent = card.m ? '意味：' + card.m : '';
  document.getElementById('aiResultBox').className = 'ai-result-box';
  document.getElementById('aiScoreBtns').style.display = 'none';
  document.getElementById('writeAnswerBox').classList.remove('show');
  document.getElementById('aiJudgeBtn').disabled = false;
  writeAnswerShown = false;
  clearWriteCanvas();
}

function showWriteAnswer() {
  const card = writeDeck[writeIndex];
  document.getElementById('writeAnswerKanji').textContent = card.k;
  document.getElementById('writeAnswerReading').textContent = card.r;
  document.getElementById('writeAnswerMeaning').textContent = card.m || '';
  document.getElementById('writeAnswerBox').classList.add('show');
  writeAnswerShown = true;
}

async function aiJudge() {
  if (!OPENAI_API_KEY) { showApiModal(); return; }
  const card = writeDeck[writeIndex];
  const canvas = document.getElementById('writeCanvas');
  const ctx = canvas.getContext('2d');

  // 空白チェック
  const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  let hasStroke = false;
  for (let i = 0; i < imgData.data.length; i += 4) {
    if (imgData.data[i + 3] > 10 && (imgData.data[i] < 240 || imgData.data[i + 1] < 240 || imgData.data[i + 2] < 240)) {
      hasStroke = true; break;
    }
  }
  if (!hasStroke) {
    showAiResult('loading', '✏️', 'まず四字熟語を書いてください', '');
    return;
  }

  const btn = document.getElementById('aiJudgeBtn');
  btn.disabled = true;
  showAiResult('loading', '<span class="spin">🔄</span>', 'AIが判定中…', '');

  const off = document.createElement('canvas');
  off.width = canvas.width; off.height = canvas.height;
  const offCtx = off.getContext('2d');
  offCtx.fillStyle = '#ffffff';
  offCtx.fillRect(0, 0, off.width, off.height);
  offCtx.drawImage(canvas, 0, 0);
  const base64 = off.toDataURL('image/jpeg', 0.7).split(',')[1];

  const prompt = `この画像は手書き四字熟語の練習です。
書くべき四字熟語：「${card.k}」（読み：${card.r}）

【判定ルール】
・手書きなので多少の崩れ・はね・とめ・はらいは許容する
・四文字すべての骨格が合っていれば「正解」とする
・筆記体・草書風でも構造が読み取れれば「正解」
・四文字のうち一字でも明らかに違う場合は「不正解」

最初の行に必ず「正解」か「不正解」の一語だけを書いてください。
2行目に20文字以内の短いコメントを書いてください。`;

  try {
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + OPENAI_API_KEY },
      body: JSON.stringify({
        model: 'gpt-4o', max_tokens: 100,
        messages: [{ role: 'user', content: [
          { type: 'text', text: prompt },
          { type: 'image_url', image_url: { url: 'data:image/jpeg;base64,' + base64, detail: 'low' } }
        ]}]
      })
    });
    if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message || 'APIエラー'); }
    const data = await res.json();
    const text = data.choices?.[0]?.message?.content || '';
    const lines = text.trim().split('\n').filter(l => l.trim());
    const verdict = lines[0]?.trim() || '';
    const comment = lines.slice(1).join(' ').trim();
    const isOk = verdict.includes('正解') && !verdict.includes('不正解');

    if (isOk) {
      showAiResult('correct', '⭕', '正解！', comment);
      recordWriteScore('good');
    } else {
      showAiResult('wrong', '❌', '不正解…', comment || '正解は「' + card.k + '」です');
      recordWriteScore('bad');
    }
    document.getElementById('aiScoreBtns').style.display = 'flex';
  } catch (e) {
    showAiResult('loading', '⚠️', '判定エラー', e.message.slice(0, 60));
    document.getElementById('aiScoreBtns').style.display = 'flex';
  } finally {
    btn.disabled = false;
  }
}

function showAiResult(type, icon, msg, detail) {
  const box = document.getElementById('aiResultBox');
  box.className = 'ai-result-box show ' + type;
  document.getElementById('aiResultIcon').innerHTML = icon;
  document.getElementById('aiResultMsg').textContent = msg;
  document.getElementById('aiResultDetail').textContent = detail;
}

function recordWriteScore(result) {
  const card = writeDeck[writeIndex];
  const key = card.set + '-' + card.num;
  const stats = loadStats();
  if (!stats[key]) stats[key] = { good: 0, warn: 0, bad: 0, word: card.k, reading: card.r };
  stats[key][result]++;
  saveStats(stats);
  updateSetBtnLabels();
}

function writeScore(result) {
  recordWriteScore(result);
  nextWriteCard();
}

function nextWriteCard() {
  if (writeIndex < writeDeck.length - 1) {
    writeIndex++;
    renderWriteCard();
  } else {
    showWriteComplete();
  }
}

function showWriteComplete() {
  const stats = loadStats();
  let good = 0, bad = 0;
  writeDeck.forEach(c => {
    const s = stats[c.set + '-' + c.num];
    if (s) { if (s.good > s.bad) good++; else bad++; }
  });
  document.getElementById('writeCompleteStats').innerHTML =
    '<span style="color:var(--good)">○ ' + good + '</span>　<span style="color:var(--bad)">× ' + bad + '</span>　/ ' + writeDeck.length + '問';
  document.getElementById('writeComplete').classList.add('show');
}

function restartWrite() {
  writeIndex = 0;
  document.getElementById('writeComplete').classList.remove('show');
  renderWriteCard();
}
